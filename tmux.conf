# ── Prefix ────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────
set -g default-shell /bin/zsh
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Reload ────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Splits ────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigation (vim-style with prefix) ────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Navigation (M-arrow, no prefix) ───────────────────────────
set -g xterm-keys on
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Copy mode ─────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel \
  "pbcopy 2>/dev/null || xclip -sel clip 2>/dev/null || true"
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar (Gruvbox) ──────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style          "bg=#282828,fg=#a89984"
set -g status-left-length    30
set -g status-left           "#[fg=#fabd2f,bold] #S #[fg=#504945]│ "
set -g status-right-length   60
set -g status-right          "#[fg=#7c6f64]%H:%M  #[fg=#fabd2f]#h "
set -g window-status-format          " #I:#W "
set -g window-status-current-format  "#[fg=#fabd2f,bold] #I:#W "
set -g pane-border-style             "fg=#3c3836"
set -g pane-active-border-style      "fg=#fabd2f"
